services:
  minecraft:
    image: itzg/minecraft-server
    ports:
      - "25565:25565"
    environment:
      VERSION: "LATEST"
      EULA: "TRUE"
      ICON: "/logo.jpg"
      OVERRIDE_ICON: "TRUE"
      DIFFICULTY: "normal"
      ENABLE_WHITELIST: "TRUE"
      # WHITELIST_FILE: "/whitelist.json"
      # ENABLE_AUTOPAUSE: "TRUE"
      ONLINE_MODE: "FALSE"
      RCON_CMDS_STARTUP: |-
        /scoreboard objectives add deaths deathCount "Deaths"
        /scoreboard objectives setdisplay list deaths
        /scoreboard objectives add ping ping "Ping"
        /scoreboard objectives setdisplay list ping
    # deploy:
    #   resources:
    #     limits:
    #       memory: 1.5G
    volumes:
      - "~/minecraft_data:/data"
      - "./whitelist.json:/whitelist.json"
      - "./logo.jpg:/logo.jpg"

  playit:
    image: ghcr.io/playit-cloud/playit-agent:0.17
    network_mode: host
    environment:
      SECRET_KEY: ${SECRET_KEY}
